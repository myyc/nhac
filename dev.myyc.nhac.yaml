app-id: dev.myyc.nhac
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: nhac

# Note: org.freedesktop.Platform.codecs-extra (successor to ffmpeg-full)
# is automatically installed with the 25.08 runtime

finish-args:
  # Tell media_kit where to find libmpv
  - --env=LIBMPV_LIBRARY_PATH=/app/lib/libmpv.so
  # Network access for streaming
  - --share=network
  # Audio playback
  - --socket=pulseaudio
  # X11 + XShm access
  - --socket=x11
  - --share=ipc
  # Wayland access
  - --socket=wayland
  # OpenGL access for rendering
  - --device=dri
  # MPRIS support
  - --own-name=org.mpris.MediaPlayer2.nhac
  # DBus access for connectivity checking
  - --socket=session-bus
  # Filesystem access for caching
  - --filesystem=xdg-cache
  - --filesystem=xdg-config
  # For window decorations
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.FileChooser
  # For notifications
  - --talk-name=org.freedesktop.Notifications
  # PipeWire socket access for modern audio
  - --filesystem=xdg-run/pipewire-0:ro

modules:
  # SQLite3 for database/caching support
  - name: sqlite3
    buildsystem: autotools
    sources:
      - type: archive
        url: https://www.sqlite.org/2025/sqlite-autoconf-3500400.tar.gz
        sha256: a3db587a1b92ee5ddac2f66b3edb41b26f9c867275782d46c3a088977d6a5b18
    config-opts:
      - --enable-shared
      - --disable-static
      - --enable-threadsafe

  # libass for subtitle support (mpv dependency)
  - name: libass
    buildsystem: autotools
    config-opts:
      - --disable-static
    sources:
      - type: archive
        url: https://github.com/libass/libass/releases/download/0.17.3/libass-0.17.3.tar.gz
        sha256: da7c348deb6fa6c24507afab2dee7545ba5dd5bbf90a137bfe9e738f7df68537

  # libplacebo for GPU video processing (mpv dependency)
  - name: libplacebo
    buildsystem: meson
    config-opts:
      - -Dopengl=enabled
      - -Dvulkan=disabled
      - -Dglslang=disabled
      - -Dd3d11=disabled
      - -Ddemos=false
    sources:
      - type: archive
        url: https://code.videolan.org/videolan/libplacebo/-/archive/v7.349.0/libplacebo-v7.349.0.tar.gz
        sha256: 79120e685a1836344b51b13b6a5661622486a84e4d4a35f6c8d01679a20fbc86
      - type: archive
        url: https://github.com/pallets/jinja/archive/refs/tags/3.1.6.tar.gz
        sha256: 2074b22a72caa65474902234b320d73463d6d4c223ee49f4b433495758356337
        dest: 3rdparty/jinja
      - type: archive
        url: https://github.com/Dav1dde/glad/archive/refs/tags/v2.0.8.tar.gz
        sha256: 44f06f9195427c7017f5028d0894f57eb216b0a8f7c4eda7ce883732aeb2d0fc
        dest: 3rdparty/glad

  # libmpv for audio playback (used by media_kit)
  - name: libmpv
    buildsystem: meson
    config-opts:
      - -Dlibmpv=true
      - -Dcplayer=false
      - -Dlua=disabled
      - -Djavascript=disabled
      - -Ddebug=false
      - -Dbuild-date=false
      - -Dalsa=disabled
      - -Dmanpage-build=disabled
      - -Dvulkan=disabled
      - -Dpulse=enabled
      - -Dpipewire=enabled
    cleanup:
      - /share/bash-completion
      - /share/zsh
      - /share/doc
      - /share/icons
      - /share/applications
    sources:
      - type: archive
        url: https://github.com/mpv-player/mpv/archive/refs/tags/v0.40.0.tar.gz
        sha256: 10a0f4654f62140a6dd4d380dcf0bbdbdcf6e697556863dc499c296182f081a3

  - name: nhac
    buildsystem: simple
    sources:
      - type: dir
        path: .
        # Only include the built application, not source
        skip:
          - .git
          - .dart_tool
          - .idea
          - flatpak-flutter
          - "*.md"
          - "*.yaml"
          - "*.yml"
          - lib
          - test
          - android
          - ios
          - macos
          - windows
          - web
    build-commands:
      # Verify the app was pre-built
      - test -f build/linux/x64/release/bundle/nhac || (echo "Error: Please run 'flutter build linux --release' first" && exit 1)

      # Install the binary to /app/bin
      - install -Dm755 build/linux/x64/release/bundle/nhac /app/bin/nhac

      # Copy lib and data directories maintaining structure
      - cp -r build/linux/x64/release/bundle/lib /app/bin/
      - cp -r build/linux/x64/release/bundle/data /app/bin/

      # Install desktop file
      - install -Dm644 linux/nhac.desktop /app/share/applications/dev.myyc.nhac.desktop

      # Install icons in multiple sizes (use dev.myyc.nhac named files if they exist, fallback to nhac-*)
      - test -f linux/icons/dev.myyc.nhac-64.png && install -Dm644 linux/icons/dev.myyc.nhac-64.png /app/share/icons/hicolor/64x64/apps/dev.myyc.nhac.png || install -Dm644 linux/icons/nhac-64.png /app/share/icons/hicolor/64x64/apps/dev.myyc.nhac.png
      - test -f linux/icons/dev.myyc.nhac-128.png && install -Dm644 linux/icons/dev.myyc.nhac-128.png /app/share/icons/hicolor/128x128/apps/dev.myyc.nhac.png || install -Dm644 linux/icons/nhac-128.png /app/share/icons/hicolor/128x128/apps/dev.myyc.nhac.png
      - test -f linux/icons/dev.myyc.nhac-256.png && install -Dm644 linux/icons/dev.myyc.nhac-256.png /app/share/icons/hicolor/256x256/apps/dev.myyc.nhac.png || install -Dm644 linux/icons/nhac-256.png /app/share/icons/hicolor/256x256/apps/dev.myyc.nhac.png
      - test -f linux/icons/dev.myyc.nhac-512.png && install -Dm644 linux/icons/dev.myyc.nhac-512.png /app/share/icons/hicolor/512x512/apps/dev.myyc.nhac.png || install -Dm644 linux/icons/nhac-512.png /app/share/icons/hicolor/512x512/apps/dev.myyc.nhac.png

      # Install symbolic notification icon (separate from main app icon, following Telegram's pattern)
      - install -Dm644 linux/icons/nhac-symbolic-16.png /app/share/icons/hicolor/16x16/apps/dev.myyc.nhac-symbolic.png
      - install -Dm644 linux/icons/nhac-symbolic-24.png /app/share/icons/hicolor/24x24/apps/dev.myyc.nhac-symbolic.png
      - install -Dm644 linux/icons/nhac-symbolic-32.png /app/share/icons/hicolor/32x32/apps/dev.myyc.nhac-symbolic.png
      - install -Dm644 linux/icons/nhac-symbolic-48.png /app/share/icons/hicolor/48x48/apps/dev.myyc.nhac-symbolic.png

      # Install AppStream metadata
      - install -Dm644 linux/dev.myyc.nhac.metainfo.xml /app/share/metainfo/dev.myyc.nhac.metainfo.xml
