app-id: dev.myyc.nhac
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: nhac
finish-args:
  # Network access for streaming
  - --share=network
  # Audio playback
  - --socket=pulseaudio
  # X11 + XShm access
  - --socket=x11
  - --share=ipc
  # Wayland access
  - --socket=wayland
  # OpenGL access for rendering
  - --device=dri
  # MPRIS support
  - --own-name=org.mpris.MediaPlayer2.nhac
  # DBus access for connectivity checking
  - --socket=session-bus
  # Filesystem access for caching
  - --filesystem=xdg-cache
  - --filesystem=xdg-config
  # For window decorations
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.FileChooser
  # For notifications
  - --talk-name=org.freedesktop.Notifications
  # PipeWire socket access for modern audio
  - --filesystem=xdg-run/pipewire-0:ro

modules:
  # PipeWire for modern audio support
  - name: pipewire
    buildsystem: meson
    sources:
      - type: archive
        url: https://gitlab.freedesktop.org/pipewire/pipewire/-/archive/1.6.3/pipewire-1.6.3.tar.gz
        sha256: 93db72dc06768db548d48ae2b8e96e7c299c89a47f5c4426f152221aa90b0f2d
    config-opts:
      - --libdir=lib
      - -Dalsa=enabled
      - -Djack=disabled
      - -Dpipewire-alsa=enabled
      - -Dgstreamer=disabled
      - -Ddocs=disabled
      - -Dman=disabled
      - -Dexamples=disabled
      - -Dtests=disabled
      - -Dsession-managers=[]
      - -Dudev=disabled
      - -Dudevrulesdir=disabled

  # SQLite3 for database/caching support
  - name: sqlite3
    buildsystem: autotools
    sources:
      - type: archive
        url: https://sqlite.org/2026/sqlite-autoconf-3510300.tar.gz
        sha256: 81f5be397049b0cae1b167f2225af7646fc0f82e4a9b3c48c9ea3a533e21d77a
    config-opts:
      - --enable-shared
      - --disable-static
      - --enable-threadsafe

  # Python virtualenv with jinja2 for libplacebo build
  - name: python3-jinja2-venv
    buildsystem: simple
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/62/a1/3d680cbfd5f4b8f15abc1d571870c5fc3e594bb582bc3b64ea099db13e56/jinja2-3.1.6-py3-none-any.whl
        sha256: 85ece4451f492d0c13c5dd7c13a64681a86afae63a5f347908daf103ce6d2f67
      - type: file
        url: https://files.pythonhosted.org/packages/a9/21/9b05698b46f218fc0e118e1f8168395c65c8a2c750ae2bab54fc4bd4e0e8/markupsafe-3.0.3-cp313-cp313-manylinux2014_x86_64.manylinux_2_17_x86_64.manylinux_2_28_x86_64.whl
        sha256: ccfcd093f13f0f0b7fdd0f198b90053bf7b2f02a3927a30e63f3ccc9df56b676
    build-commands:
      - python3 -m venv /app/jinja2-venv
      - /app/jinja2-venv/bin/pip install --no-deps --no-index --find-links . markupsafe-3.0.3-cp313-cp313-manylinux2014_x86_64.manylinux_2_17_x86_64.manylinux_2_28_x86_64.whl
      - /app/jinja2-venv/bin/pip install --no-deps --no-index --find-links . jinja2-3.1.6-py3-none-any.whl

  # libplacebo dependency for mpv
  - name: libplacebo
    buildsystem: meson
    sources:
      - type: archive
        url: https://github.com/haasn/libplacebo/archive/refs/tags/v7.360.1.tar.gz
        sha256: d05fdf90bea2f629eaa2d115e909fd356388ac639e54f77b87a018a6d76224bd
    build-options:
      env:
        PATH: "/app/jinja2-venv/bin:/usr/bin:/bin"
        PYTHONPATH: "/app/jinja2-venv/lib/python3.13/site-packages"
    config-opts:
      - --libdir=lib
      - -Dvulkan=disabled
      - -Dopengl=disabled
      - -Dd3d11=disabled
      - -Dlcms=disabled
      - -Ddemos=false
      - -Dtests=false
      - -Dbench=false
      - -Dfuzz=false

  # libass dependency for mpv (required even for audio-only)
  - name: libass
    buildsystem: autotools
    sources:
      - type: archive
        url: https://github.com/libass/libass/releases/download/0.17.4/libass-0.17.4.tar.gz
        sha256: a886b3b80867f437bc55cff3280a652bfa0d37b43d2aff39ddf3c4f288b8c5a8
    config-opts:
      - --disable-static
      - --enable-shared

  # Build libmpv from source (audio only)
  - name: libmpv
    buildsystem: meson
    sources:
      - type: archive
        url: https://github.com/mpv-player/mpv/archive/v0.41.0.tar.gz
        sha256: ee21092a5ee427353392360929dc64645c54479aefdb5babc5cfbb5fad626209
    config-opts:
      - --libdir=lib
      - -Dlibmpv=true
      - -Dcplayer=false
      - -Dmanpage-build=disabled
      - -Dhtml-build=disabled
      # Audio only, disable all video
      - -Dgl=disabled
      - -Dvulkan=disabled
      - -Dvaapi=disabled
      - -Dvdpau=disabled
      - -Dx11=disabled
      - -Dwayland=disabled
      - -Ddrm=disabled
      - -Dgbm=disabled
      - -Degl=disabled
      # Enable audio support
      - -Dalsa=enabled
      - -Dpulse=enabled
      - -Dpipewire=auto
      # Disable features we don't need
      - -Dlua=disabled
      - -Djavascript=disabled
      - -Dzlib=disabled
      - -Dlcms2=disabled
      - -Dlibbluray=disabled
      - -Ddvdnav=disabled
      - -Dcdda=disabled
      - -Duchardet=disabled
      - -Drubberband=disabled
      - -Dzimg=disabled
      - -Dcaca=disabled
      - -Dlibarchive=disabled
      - -Dlibavdevice=disabled

  - name: nhac
    buildsystem: simple
    sources:
      - type: dir
        path: .
        # Only include the built application, not source
        skip:
          - .git
          - .dart_tool
          - .idea
          - flatpak-flutter
          - "*.md"
          - "*.yaml"
          - "*.yml"
          - lib
          - test
          - android
          - ios
          - macos
          - windows
          - web
    build-commands:
      # Verify the app was pre-built
      - test -f build/linux/x64/release/bundle/nhac || (echo "Error: Please run 'flutter build linux --release' first" && exit 1)

      # Install the binary to /app/bin
      - install -Dm755 build/linux/x64/release/bundle/nhac /app/bin/nhac

      # Copy lib and data directories maintaining structure
      - cp -r build/linux/x64/release/bundle/lib /app/bin/
      - cp -r build/linux/x64/release/bundle/data /app/bin/

      # Install desktop file
      - install -Dm644 linux/nhac.desktop /app/share/applications/dev.myyc.nhac.desktop

      # Install icons in multiple sizes
      - test -f linux/icons/dev.myyc.nhac-64.png && install -Dm644 linux/icons/dev.myyc.nhac-64.png /app/share/icons/hicolor/64x64/apps/dev.myyc.nhac.png || install -Dm644 linux/icons/nhac-64.png /app/share/icons/hicolor/64x64/apps/dev.myyc.nhac.png
      - test -f linux/icons/dev.myyc.nhac-128.png && install -Dm644 linux/icons/dev.myyc.nhac-128.png /app/share/icons/hicolor/128x128/apps/dev.myyc.nhac.png || install -Dm644 linux/icons/nhac-128.png /app/share/icons/hicolor/128x128/apps/dev.myyc.nhac.png
      - test -f linux/icons/dev.myyc.nhac-256.png && install -Dm644 linux/icons/dev.myyc.nhac-256.png /app/share/icons/hicolor/256x256/apps/dev.myyc.nhac.png || install -Dm644 linux/icons/nhac-256.png /app/share/icons/hicolor/256x256/apps/dev.myyc.nhac.png
      - test -f linux/icons/dev.myyc.nhac-512.png && install -Dm644 linux/icons/dev.myyc.nhac-512.png /app/share/icons/hicolor/512x512/apps/dev.myyc.nhac.png || install -Dm644 linux/icons/nhac-512.png /app/share/icons/hicolor/512x512/apps/dev.myyc.nhac.png

      # Install symbolic notification icon
      - install -Dm644 linux/icons/nhac-symbolic-16.png /app/share/icons/hicolor/16x16/apps/dev.myyc.nhac-symbolic.png
      - install -Dm644 linux/icons/nhac-symbolic-24.png /app/share/icons/hicolor/24x24/apps/dev.myyc.nhac-symbolic.png
      - install -Dm644 linux/icons/nhac-symbolic-32.png /app/share/icons/hicolor/32x32/apps/dev.myyc.nhac-symbolic.png
      - install -Dm644 linux/icons/nhac-symbolic-48.png /app/share/icons/hicolor/48x48/apps/dev.myyc.nhac-symbolic.png

      # Install AppStream metadata
      - install -Dm644 linux/dev.myyc.nhac.metainfo.xml /app/share/metainfo/dev.myyc.nhac.metainfo.xml
